name: Deploy with Secrets to GitHub Pages

on:
  push:
    branches: [ main ]  # أو master حسب فرعك الرئيسي

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v3

      - name: 🔐 إنشاء ملف config.js من الأسرار
        run: |
          echo "window.TELEGRAM_BOT_TOKEN = '${{ secrets.TELEGRAM_BOT_TOKEN }}';" > config.js
          echo "window.TELEGRAM_CHAT_ID = '${{ secrets.TELEGRAM_CHAT_ID }}';" >> config.js

      - name: 🚀 نشر إلى GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
